version: '3'

tasks:
  default:
    desc: 'Default task runs the "build" task'
    deps:
      - build

  list:
    desc: 'Lists available tasks'
    cmds:
      - task --list-all

  dev-deps:
    desc: 'Install developer dependencies'
    deps:
      - npm-deps
    cmds:
      - go install 'golang.org/x/tools/cmd/godoc@latest'
      - go install 'golang.org/x/pkgsite/cmd/pkgsite@latest'

  npm-deps:
    desc: 'Install npm dependencies'
    cmds:
      - npm install
    sources:
      - package.json
    generates:
      - package-lock.json

###############################################################################

  go-tidy:
    desc: 'Go tidy all the things'
    cmds:
      - go mod tidy

  go-update:
    desc: 'Go update all the dependencies'
    cmds:
      - go get -u ./...

  build:
    desc: 'Build all the things'
    deps:
      - dev-deps
      - build-cmds

  clean:
    desc: 'Clean commands'
    deps:
      - clean-cmds
      - clean-npm
 
  clean-npm:
    desc: 'Cleans node_modules and package-lock.json'
    cmds:
      - rm -rf node_modules package-lock.json

###############################################################################
# Commands

  build-cmds:
    desc: 'Build all commands'
    deps:
      - build-cmd-booba-view-example-native
      - build-cmd-booba-view-example-wasm

  build-cmd-booba-view-example-native:
    desc: 'Build booba-view-example command'
    deps: [go-tidy]
    cmds:
      - go build -o bin/booba-view-example cmd/booba-view-example/*.go
    sources:
      - cmd/booba-view-example/*.go
    generates:
      - bin/booba-view-example

  build-cmd-booba-view-example-wasm:
    desc: 'Build booba-view-example command in WASM'
    deps: [go-tidy]
    env:
      GOOS: js
      GOARCH: wasm 
    cmds:
      - go build -o bin/booba-view-example.wasm cmd/booba-view-example/*.go
    sources:
      - cmd/booba-view-example/*.go
    generates:
      - bin/booba-view-example.wasm

  clean-cmds:
    desc: 'Cleans all commands'
    cmds:
      - rm -f bin/booba-view-example

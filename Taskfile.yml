version: '3'

vars:
  GOLANGCI_LINT_VERSION: v2.10.1

tasks:
  default:
    desc: 'Default task runs the "test" and "build" tasks'
    deps:
      - test
      - build

  list:
    desc: 'Lists available tasks'
    cmds:
      - task --list-all

  dev-deps:
    desc: 'Install developer dependencies'
    cmds:
      - go install 'golang.org/x/tools/cmd/godoc@latest'
      - go install 'golang.org/x/pkgsite/cmd/pkgsite@latest'
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
      - go install github.com/kisielk/errcheck@latest
      - npm install

  npm-deps:
    desc: 'Install npm dependencies'
    cmds:
      - npm ci
    sources:
      - package.json
      - package-lock.json

  build:
    desc: 'Build all the things'
    deps:
      - build-assets
      - build-cmds

  test:
    desc: 'Test go-booba'
    deps:
      - go-test

###############################################################################

  go-tidy:
    desc: 'Go tidy all the things'
    cmds:
      - go mod tidy

  go-update:
    desc: 'Go update all the dependencies'
    cmds:
      - go get -u ./...

  go-lint:
    desc: Run golangci-lint with errcheck
    cmds:
      - golangci-lint run --enable=errcheck --timeout=5m ./...

  go-test:
    desc: 'Run Go tests'
    deps: [build-serve-assets]
    cmds:
      - go test ./...

  build-assets:
    desc: 'Build frontend assets'
    deps: [npm-deps]
    cmds:
      - npm run build:embed
    sources:
      - ts/*.ts
    generates:
      - serve/static/booba/*.js

  build-npm:
    desc: 'Build npm package to dist/'
    deps: [npm-deps]
    cmds:
      - npm run build
    sources:
      - ts/*.ts
    generates:
      - dist/*.js

  build-serve-assets:
    desc: 'Copy ghostty-web into serve/static/ for go:embed'
    deps: [build-assets]
    cmds:
      - mkdir -p serve/static/ghostty-web
      - cp -r node_modules/ghostty-web/dist/* serve/static/ghostty-web/
    sources:
      - serve/static/booba/*.js
      - node_modules/ghostty-web/dist/*
    generates:
      - serve/static/booba/*.js
      - serve/static/ghostty-web/ghostty-web.js
      - serve/static/ghostty-web/ghostty-vt.wasm

  clean:
    desc: 'Clean commands'
    deps:
      - clean-cmds
      - clean-assets
 
  clean-assets:
    desc: 'Cleans compiled assets'
    cmds:
      - rm -rf dist
      - rm -rf serve/static/booba
      - rm -rf serve/static/ghostty-web

###############################################################################
# Commands

  build-cmds:
    desc: 'Build all commands'
    deps:
      - build-cmd-booba
      - build-cmd-booba-view-example-native
      - build-cmd-booba-view-example-wasm

  build-cmd-booba:
    desc: 'Build booba command'
    deps: [go-tidy, build-serve-assets]
    cmds:
      - go build -o bin/booba ./cmd/booba/
    sources:
      - cmd/booba/*.go
      - internal/cli/*.go
      - serve/*.go
    generates:
      - bin/booba

  build-cmd-booba-view-example-native:
    desc: 'Build booba-view-example command'
    deps: [go-tidy, build-serve-assets]
    cmds:
      - go build -o bin/booba-view-example ./cmd/booba-view-example/
    sources:
      - cmd/booba-view-example/*.go
      - internal/cli/*.go
      - serve/*.go
    generates:
      - bin/booba-view-example

  build-cmd-booba-view-example-wasm:
    desc: 'Build booba-view-example command in WASM'
    deps: [go-tidy]
    cmds:
      - internal/wasm_overlay/wasm_build.sh -o bin/booba-view-example.wasm ./cmd/booba-view-example/
    sources:
      - cmd/booba-view-example/*.go
      - internal/wasm_overlay/*.go
    generates:
      - bin/booba-view-example.wasm

  clean-cmds:
    desc: 'Cleans all commands'
    cmds:
      - rm -f bin/booba
      - rm -f bin/booba-view-example
      - rm -f bin/booba-view-example.wasm

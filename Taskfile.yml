version: '3'

vars:
  GOLANGCI_LINT_VERSION: v2.10.1

tasks:
  default:
    desc: 'Default task runs the "test" and "build" tasks'
    deps:
      - test
      - build

  list:
    desc: 'Lists available tasks'
    cmds:
      - task --list-all

  dev-deps:
    desc: 'Install developer dependencies'
    cmds:
      - go install 'golang.org/x/tools/cmd/godoc@latest'
      - go install 'golang.org/x/pkgsite/cmd/pkgsite@latest'
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
      - go install github.com/kisielk/errcheck@latest
      - npm install
      - task: install-hooks

  install-hooks:
    desc: 'Install git hooks from .githooks/'
    cmds:
      - git config core.hooksPath .githooks
      - echo "Git hooks installed (pre-commit lints, pre-push checks version tags)"

  npm-deps:
    desc: 'Install npm dependencies'
    run: once
    cmds:
      - npm ci
    sources:
      - package.json
      - package-lock.json

  build:
    desc: 'Build all the things'
    deps:
      - build-assets
      - build-cmds

  test:
    desc: 'Test go-booba'
    deps:
      - go-test

###############################################################################

  go-tidy:
    desc: 'Go tidy all the things'
    run: once
    cmds:
      - go mod tidy

  go-update:
    desc: 'Go update all the dependencies'
    cmds:
      - go get -u ./...

  go-lint:
    desc: Run golangci-lint with errcheck
    cmds:
      - golangci-lint run --enable=errcheck --timeout=5m ./...

  go-test:
    desc: 'Run Go tests'
    deps: [build-serve-assets]
    cmds:
      - go test ./...

###############################################################################
# Assets

  build-assets:
    desc: 'Build frontend assets'
    deps: [npm-deps]
    run: once
    cmds:
      - npm run build:embed
    sources:
      - package.json
      - tsconfig.embed.json
      - ts/*.ts
    generates:
      - serve/static/booba/*.js

  build-npm:
    desc: 'Build npm package to dist/'
    deps: [npm-deps]
    cmds:
      - npm run build
    sources:
      - ts/*.ts
    generates:
      - dist/*.js

  init-submodules:
    desc: 'Initialize git submodules (third_party/ghostty-web + nested ghostty)'
    run: once
    cmds:
      - git submodule update --init --recursive
    status:
      - test -e third_party/ghostty-web/.git
      - test -e third_party/ghostty-web/ghostty/.git

  build-ghostty-web:
    desc: 'Build wasm + lib inside third_party/ghostty-web. Uses nix locally (pinned zig 0.15.2); in CI assumes zig + bun are already on PATH.'
    deps: [init-submodules]
    run: once
    cmds:
      - |
        cd third_party/ghostty-web
        if command -v nix >/dev/null 2>&1 && [ -z "$CI" ]; then
          nix --extra-experimental-features 'nix-command flakes' develop --command bun run build
        else
          bun run build
        fi
    sources:
      - third_party/ghostty-web/lib/**/*.ts
      - third_party/ghostty-web/scripts/build-wasm.sh
      - third_party/ghostty-web/patches/*.patch
      - third_party/ghostty-web/package.json
    generates:
      - third_party/ghostty-web/dist/ghostty-web.js
      - third_party/ghostty-web/ghostty-vt.wasm

  build-serve-assets:
    desc: 'Copy ghostty-web into serve/static/ for go:embed'
    deps: [build-assets, build-ghostty-web]
    run: once
    cmds:
      - mkdir -p serve/static/ghostty-web
      - cp -r third_party/ghostty-web/dist/* serve/static/ghostty-web/
    sources:
      - serve/static/booba/*.js
      - third_party/ghostty-web/dist/*
    generates:
      - serve/static/booba/*.js
      - serve/static/ghostty-web/ghostty-web.js
      - serve/static/ghostty-web/ghostty-vt.wasm

  clean:
    desc: 'Clean commands'
    deps:
      - clean-cmds
      - clean-assets
 
  clean-assets:
    desc: 'Cleans compiled assets'
    cmds:
      - rm -rf dist
      - rm -rf serve/static/booba
      - rm -rf serve/static/ghostty-web

###############################################################################
# Commands

  build-cmds:
    desc: 'Build all commands'
    deps:
      - build-cmd-booba
      - build-cmd-booba-assets
      - build-cmd-booba-sip-client
      - build-cmd-booba-wasm-build
      - build-cmd-booba-view-example-native
      - build-cmd-booba-view-example-wasm

  build-cmd-booba-assets:
    desc: 'Build booba-assets command'
    deps: [go-tidy]
    cmds:
      - go build -o bin/booba-assets ./cmd/booba-assets/
    sources:
      - cmd/booba-assets/**/*
    generates:
      - bin/booba-assets

  build-cmd-booba-wasm-build:
    desc: 'Build booba-wasm-build command'
    deps: [go-tidy]
    cmds:
      - go build -o bin/booba-wasm-build ./cmd/booba-wasm-build/
    sources:
      - cmd/booba-wasm-build/**/*
    generates:
      - bin/booba-wasm-build

  build-cmd-booba:
    desc: 'Build booba command'
    deps: [go-tidy, build-serve-assets]
    cmds:
      - go build -o bin/booba ./cmd/booba/
    sources:
      - cmd/booba/*.go
      - internal/cli/*.go
      - serve/*.go
      - serve/static/**/*
    generates:
      - bin/booba

  build-cmd-booba-sip-client:
    desc: 'Build booba-sip-client command'
    deps: [go-tidy]
    cmds:
      - go build -o bin/booba-sip-client ./cmd/booba-sip-client/
    sources:
      - cmd/booba-sip-client/*.go
      - internal/sipclient/*.go
      - sip/*.go
    generates:
      - bin/booba-sip-client

  build-cmd-booba-view-example-native:
    desc: 'Build booba-view-example command'
    deps: [go-tidy, build-serve-assets]
    cmds:
      - go build -o bin/booba-view-example ./cmd/booba-view-example/
    sources:
      - cmd/booba-view-example/*.go
      - internal/cli/*.go
      - serve/*.go
      - serve/static/**/*
    generates:
      - bin/booba-view-example

  build-cmd-booba-view-example-wasm:
    desc: 'Build booba-view-example command in WASM'
    deps: [go-tidy, build-cmd-booba-wasm-build]
    cmds:
      - bin/booba-wasm-build -o bin/booba-view-example.wasm ./cmd/booba-view-example/
    sources:
      - cmd/booba-view-example/*.go
      - cmd/booba-wasm-build/**/*
    generates:
      - bin/booba-view-example.wasm

  clean-cmds:
    desc: 'Cleans all commands'
    cmds:
      - rm -f bin/booba
      - rm -f bin/booba-assets
      - rm -f bin/booba-sip-client
      - rm -f bin/booba-wasm-build
      - rm -f bin/booba-view-example
      - rm -f bin/booba-view-example.wasm

###############################################################################
# Documentation generation (via cobra's doc subpackage)

  docs:build:
    desc: 'Regenerate man pages, markdown docs, and shell completions'
    deps:
      - docs:man:build
      - docs:md:build
      - docs:completions:build

  docs:clean:
    desc: 'Remove all generated docs and completions'
    deps:
      - docs:man:clean
      - docs:md:clean
      - docs:completions:clean

  docs:man:build:
    desc: 'Generate man pages into docs/man/'
    deps: [build-cmd-booba]
    cmds:
      - ./bin/booba docs man -o docs/man
    sources:
      - cmd/booba/*.go
      - internal/cli/*.go
    generates:
      - docs/man/booba.1

  docs:man:clean:
    desc: 'Remove generated man pages'
    cmds:
      - rm -rf docs/man

  docs:md:build:
    desc: 'Generate markdown docs into docs/markdown/'
    deps: [build-cmd-booba]
    cmds:
      - ./bin/booba docs markdown -o docs/markdown
    sources:
      - cmd/booba/*.go
      - internal/cli/*.go
    generates:
      - docs/markdown/booba.md

  docs:md:clean:
    desc: 'Remove generated markdown docs'
    cmds:
      - rm -rf docs/markdown

  docs:completions:build:
    desc: 'Regenerate shell completion scripts into completions/'
    deps: [build-cmd-booba]
    cmds:
      - mkdir -p completions
      - ./bin/booba completion bash > completions/booba.bash
      - ./bin/booba completion zsh > completions/booba.zsh
      - ./bin/booba completion fish > completions/booba.fish
    sources:
      - cmd/booba/*.go
      - internal/cli/*.go
    generates:
      - completions/booba.bash
      - completions/booba.zsh
      - completions/booba.fish

  docs:completions:clean:
    desc: 'Remove generated shell completion scripts'
    cmds:
      - rm -f completions/booba.bash completions/booba.zsh completions/booba.fish

###############################################################################
# Release verification

  release:check:
    desc: 'Validate GoReleaser configuration'
    cmds:
      - goreleaser check

  release:snapshot:
    desc: 'Build release artifacts locally without publishing'
    deps: [build-serve-assets]
    cmds:
      - goreleaser release --snapshot --clean

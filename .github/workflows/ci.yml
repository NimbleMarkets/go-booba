name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: go-task/setup-task@v2

      - name: Build assets
        run: task build-serve-assets

      - name: Test
        run: task test

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --enable=errcheck --timeout=5m ./...

      - name: Build
        run: task build

# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# .goreleaser.yml
# CGO-free release builds for go-booba CLI utilities.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: booba
    main: ./cmd/booba
    binary: booba
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: booba-assets
    main: ./cmd/booba-assets
    binary: booba-assets
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: booba-sip-client
    main: ./cmd/booba-sip-client
    binary: booba-sip-client
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: booba-wasm-build
    main: ./cmd/booba-wasm-build
    binary: booba-wasm-build
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE.txt
      - README.md

checksum:
  name_template: checksums.txt

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - booba
        - booba-assets
        - booba-sip-client
        - booba-wasm-build
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
        entitlements: ./etc/entitlements.plist
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booba View Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .terminal-window {
            width: 100%;
            max-width: 1000px;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .title-bar {
            background: #2d2d2d;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1a1a1a;
        }

        .traffic-lights {
            display: flex;
            gap: 8px;
        }

        .light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .light.red {
            background: #ff5f56;
        }

        .light.yellow {
            background: #ffbd2e;
        }

        .light.green {
            background: #27c93f;
        }

        .title {
            color: #e5e5e5;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .connection-status {
            margin-left: auto;
            font-size: 11px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .connection-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #666;
            transition: background-color 0.3s;
        }

        .connection-dot.connected {
            background: #27c93f;
        }

        .connection-dot.disconnected {
            background: #dc3545;
        }

        .connection-dot.connecting {
            background: #e6b800;
        }

        #terminal-container {
            padding: 16px;
            background: #1e1e1e;
            /* Ensure the container has dimensions for the terminal */
            min-height: 400px;
        }
    </style>
</head>

<body>
    <div class="terminal-window">
        <div class="title-bar">
            <div class="traffic-lights">
                <span class="light red"></span>
                <span class="light yellow"></span>
                <span class="light green"></span>
            </div>
            <div class="title">booba-view-example</div>
            <div class="connection-status">
                <span class="connection-dot connecting" id="connection-dot"></span>
                <span id="connection-text">Connecting...</span>
            </div>
        </div>
        <div id="terminal-container"></div>
    </div>

    <script type="module">
        import { BoobaTerminal } from './booba/booba.js';

        const connectionDot = document.getElementById('connection-dot');
        const connectionText = document.getElementById('connection-text');

        window.onerror = function (message, source, lineno, colno, error) {
            console.error('Global Error:', message, source, lineno, colno, error);
            connectionText.textContent = 'Error: ' + message;
            connectionDot.className = 'connection-dot disconnected';
        };

        async function main() {
            const booba = new BoobaTerminal('terminal-container', {
                cols: 80,
                rows: 60,
            });

            booba.onStatusChange = (state, message) => {
                connectionDot.className = `connection-dot ${state}`;
                connectionText.textContent = message;
            };

            booba.onTitleChange = (title) => {
                document.querySelector('.title').textContent = title || 'booba-view-example';
            };

            booba.onBell = () => {
                // Brief visual flash on bell
                const container = document.getElementById('terminal-container');
                container.style.outline = '2px solid #ffbd2e';
                setTimeout(() => { container.style.outline = 'none'; }, 150);
            };

            await booba.init();

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            booba.connectWebSocket(wsUrl);

            // Focus terminal for immediate keyboard input
            booba.focus();
        }

        main().catch(console.error);
    </script>
</body>

</html>

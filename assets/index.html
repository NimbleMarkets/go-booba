<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booba View Example</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #terminal {
            width: 80%;
            height: 80%;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #status-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 12px;
            font-weight: bold;
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            pointer-events: none;
            transition: background-color 0.3s;
        }

        .status-connecting {
            background-color: #e6b800 !important;
        }

        /* Yellow */
        .status-connected {
            background-color: #28a745 !important;
        }

        /* Green */
        .status-disconnected {
            background-color: #dc3545 !important;
        }

        /* Red */
    </style>
</head>

<body>
    <div id="terminal"></div>
    <div id="status-overlay" class="status-connecting">Connecting...</div>
    <script type="module">
        window.onerror = function (message, source, lineno, colno, error) {
            console.error('Global Error:', message, source, lineno, colno, error);
            const overlay = document.getElementById('status-overlay');
            if (overlay) {
                overlay.textContent = 'Error: ' + message;
                overlay.className = 'status-disconnected';
            }
        };

        import { init, Terminal } from './ghostty-web/ghostty-web.js';

        const statusOverlay = document.getElementById('status-overlay');

        function updateStatus(state, message) {
            statusOverlay.className = `status-${state}`;
            statusOverlay.textContent = message;
        }

        async function main() {
            await init();
            const term = new Terminal({
                fontSize: 14,
                cols: 80,
                rows: 24,
                theme: {
                    background: '#1a1b26',
                    foreground: '#a9b1d6',
                },
            });
            term.open(document.getElementById('terminal'));
            console.log('Terminal opened. Size:', term.cols, 'x', term.rows);

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            const websocket = new WebSocket(wsUrl);

            term.onData((data) => {
                if (websocket.readyState === WebSocket.OPEN) {
                    // Protocol: 0x01 + data
                    const payload = new Uint8Array(data.length + 1);
                    payload[0] = 0x01;
                    for (let i = 0; i < data.length; i++) {
                        payload[i + 1] = data.charCodeAt(i);
                    }
                    websocket.send(payload);
                }
            });

            function sendResize(cols, rows) {
                if (websocket.readyState === WebSocket.OPEN) {
                    // Protocol: 0x02 + JSON
                    const json = JSON.stringify({ cols, rows });
                    const encoder = new TextEncoder();
                    const jsonBytes = encoder.encode(json);
                    const payload = new Uint8Array(jsonBytes.length + 1);
                    payload[0] = 0x02;
                    payload.set(jsonBytes, 1);
                    websocket.send(payload);
                    console.log('Sent resize:', cols, rows);
                }
            }

            // Simple fit logic (approximate) or just rely on window resize
            // Since we don't have xterm-addon-fit, we'll just send the current size on connect
            // and maybe listen to window resize to update if we could calculate it.
            // For now, let's just send the initial size.

            websocket.onmessage = (e) => {
                // console.log('WebSocket Message Received:', e.data);
                // Handle binary data if needed, but text is usually fine for xterm/ghostty
                if (e.data instanceof Blob) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        // console.log('WebSocket Binary Data:', new Uint8Array(reader.result));
                        term.write(new Uint8Array(reader.result));
                    };
                    reader.readAsArrayBuffer(e.data);
                } else {
                    // console.log('Writing to terminal:', e.data);
                    term.write(e.data);
                }
            };

            websocket.onopen = () => {
                console.log('Connected to WebSocket');
                updateStatus('connected', 'Connected');
                sendResize(term.cols, term.rows);
            };

            websocket.onclose = (e) => {
                console.log('Disconnected from WebSocket', e.code, e.reason);
                term.write('\r\nConnection closed.\r\n');
                updateStatus('disconnected', 'Disconnected');
            };

            websocket.onerror = (e) => {
                console.error('WebSocket Error:', e);
                updateStatus('disconnected', 'Error');
            };
        }

        main().catch(console.error);
    </script>
</body>

</html>

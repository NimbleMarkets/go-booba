<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>booba</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: #1e1e1e;
            display: flex;
        }
        #terminal-container {
            flex: 1;
            min-height: 0;
            padding: 4px;
            overflow: hidden;
        }
        .status {
            position: fixed;
            top: 8px;
            right: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #666;
            transition: background-color 0.3s;
        }
        .status-dot.connected { background: #27c93f; }
        .status-dot.disconnected { background: #dc3545; }
        .status-dot.connecting, .status-dot.reconnecting { background: #e6b800; }
    </style>
</head>
<body>
    <div class="status">
        <span class="status-dot connecting" id="status-dot"></span>
        <span id="status-text">Connecting...</span>
    </div>
    <div id="terminal-container"></div>

    <script type="module">
        import { BoobaTerminal, resolveBoobaURLs } from './static/booba/booba.js';

        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');

        function isLoopbackHost(hostname) {
            return hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '::1';
        }

        async function main() {
            const booba = new BoobaTerminal('terminal-container');

            booba.onStatusChange = (state, message) => {
                dot.className = `status-dot ${state}`;
                text.textContent = message;
            };

            booba.onTitleChange = (title) => {
                document.title = title || 'booba';
            };

            booba.onBell = () => {
                const c = document.getElementById('terminal-container');
                c.style.outline = '2px solid #ffbd2e';
                setTimeout(() => { c.style.outline = 'none'; }, 150);
            };

            await booba.init();

            // Resolve endpoints relative to the page so booba works behind
            // a path-prefix reverse proxy that strips the prefix.
            const urls = resolveBoobaURLs(document.baseURI);
            const webTransportOK = typeof WebTransport !== 'undefined' &&
                (window.location.protocol === 'https:' || isLoopbackHost(window.location.hostname));

            booba.connectAuto(
                urls.wsUrl,
                webTransportOK ? urls.wtUrl : null,
                webTransportOK ? urls.certHashUrl : null,
            );
            booba.focus();

            // Handle mobile keyboard showing/hiding using visualViewport API
            if (window.visualViewport) {
                const container = document.getElementById('terminal-container');
                window.visualViewport.addEventListener('resize', () => {
                    const keyboardHeight = window.innerHeight - window.visualViewport.height;
                    if (keyboardHeight > 100) {
                        container.style.height = window.visualViewport.height + 'px';
                    } else {
                        container.style.height = '';
                    }
                    booba.fitAddon?.fit();
                });
            }
        }

        main().catch(console.error);
    </script>
</body>
</html>
